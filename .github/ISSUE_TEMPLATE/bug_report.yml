name: Bug Report
description: Report a reproducible bug
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short, clear summary of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Provide minimal steps to reproduce.
      placeholder: |
        1. Run ...
        2. Submit ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Rust version, tool versions, and relevant config.
      placeholder: |
        - OS:
        - rustc:
        - cargo:
        - bun (if TUI-related):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Paste relevant logs or stack traces.
      render: shell
