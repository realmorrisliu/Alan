name: Feature Request
description: Propose a new feature or enhancement
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the API/UX/behavior you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives did you evaluate?

  - type: textarea
    id: impact
    attributes:
      label: Impact and Scope
      description: Which crates/modules are likely affected?
      placeholder: runtime / protocol / tools / alan / clients
