name = "reference-coding-agent"
version = "0.1.0"
description = "Coding product-layer reference built on top of Alan runtime primitives."

[governance]
profile = "autonomous"
policy_path = ".alan/policy.yaml"

[tools]
profile = "all"

[skills]
paths = [
    "reference/coding-agent/skills/decompose/SKILL.md",
    "reference/coding-agent/skills/edit-verify/SKILL.md",
    "reference/coding-agent/skills/deliver/SKILL.md",
]

[extensions]
manifests = [
    "reference/coding-agent/extensions/code-index.yaml",
    "reference/coding-agent/extensions/test-analyzer.yaml",
    "reference/coding-agent/extensions/pr-helper.yaml",
]
